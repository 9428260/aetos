services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aetos
      POSTGRES_PASSWORD: aetos
      POSTGRES_DB: aetos
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aetos"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: uvicorn aetos.api.app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aetos:aetos@db:5432/aetos
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src

  loop:
    build: .
    command: python -m aetos.loop
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aetos:aetos@db:5432/aetos
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src

  mcp:
    build: .
    command: python -m aetos.mcp.server
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aetos:aetos@db:5432/aetos
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src

volumes:
  pgdata:
